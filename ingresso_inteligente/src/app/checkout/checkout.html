<app-ticket-item 
  eventName="Ingressos"
  [quantity]="ingressos().length"
  (quantityChange)="ajustarQuantidade($event)" />

<hr>

@for (item of ingressos(); track item.id) {
  <app-card [title]="item.nome">
    <p>Preço: {{ item.preco | currency:'BRL' }}</p>
    <button (click)='remover(item.id)'>Excluir este</button>
  </app-card>
}
